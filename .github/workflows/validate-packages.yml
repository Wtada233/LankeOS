name: Validate Packages

on:
  push:
    branches: [main]
    paths:
      - 'pkgs/**'
      - '.github/workflows/validate-packages.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pkgs/**'
      - '.github/workflows/validate-packages.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate JSON and script syntax
        run: |
          set -uo pipefail
          PKGS_DIR="pkgs"
          TOTAL=0; JSON_FAIL=0; SCRIPT_FAIL=0
          FAILED=""
          for pkg_dir in "$PKGS_DIR"/*/; do
            [ -d "$pkg_dir" ] || continue
            pkg_name=$(basename "$pkg_dir")
            json_file="${pkg_dir}LankeBUILD.json"
            script_file="${pkg_dir}LankeBUILD"
            TOTAL=$((TOTAL + 1))
            bad=false
            if [ ! -f "$json_file" ]; then
              echo "::error file=$pkg_dir::[$pkg_name] LankeBUILD.json missing"
              JSON_FAIL=$((JSON_FAIL + 1)); bad=true
            elif ! jq empty "$json_file" 2>/dev/null; then
              echo "::error file=$json_file::[$pkg_name] Invalid JSON"
              JSON_FAIL=$((JSON_FAIL + 1)); bad=true
            else
              for field in name version; do
                if ! jq -e ".${field}" "$json_file" >/dev/null 2>&1; then
                  echo "::error file=$json_file::[$pkg_name] Missing '${field}'"
                  JSON_FAIL=$((JSON_FAIL + 1)); bad=true
                fi
              done
              st=$(jq -r '.sources | type' "$json_file" 2>/dev/null || echo "missing")
              case "$st" in missing|null|array) ;; *)
                echo "::error file=$json_file::[$pkg_name] 'sources' must be array (got: $st)"
                JSON_FAIL=$((JSON_FAIL + 1)); bad=true ;; esac
            fi
            if [ ! -f "$script_file" ]; then
              echo "::error file=$pkg_dir::[$pkg_name] LankeBUILD script missing"
              SCRIPT_FAIL=$((SCRIPT_FAIL + 1)); bad=true
            elif ! bash -n "$script_file" 2>/dev/null; then
              echo "::error file=$script_file::[$pkg_name] Script syntax error"
              bash -n "$script_file" 2>&1 | sed 's/^/  /'
              SCRIPT_FAIL=$((SCRIPT_FAIL + 1)); bad=true
            fi
            [ "$bad" = true ] && FAILED="$FAILED $pkg_name"
          done
          echo ""
          echo "--- JSON & Script Validation ---"
          echo "  Packages: $TOTAL"
          echo "  JSON:     $((TOTAL - JSON_FAIL))/$TOTAL valid  (${JSON_FAIL} failed)"
          echo "  Scripts:  $((TOTAL - SCRIPT_FAIL))/$TOTAL valid  (${SCRIPT_FAIL} failed)"
          [ -n "$FAILED" ] && echo "  Failed:  $FAILED"
          [ "$JSON_FAIL" -gt 0 ] || [ "$SCRIPT_FAIL" -gt 0 ] && echo "::error::Validation failed" && exit 1
          echo "  Result:   PASS"

      - name: Check source URL reachability
        run: |
          set -uo pipefail
          PKGS_DIR="pkgs"
          URL_TMP=$(mktemp)

          # Collect all URLs
          for pkg_dir in "$PKGS_DIR"/*/; do
            [ -d "$pkg_dir" ] || continue
            jq -r '(.sources // [])[], (.work_sources // [])[]' "$(printf '%s' "$pkg_dir")LankeBUILD.json" 2>/dev/null | \
              while IFS= read -r url; do
                [ -n "$url" ] && echo "$(basename "$pkg_dir")|$url"
              done
          done > "$URL_TMP"

          url_total=$(sort -u "$URL_TMP" | wc -l)
          echo "--- Checking $url_total URLs (parallel, silent unless errors) ---"

          # Write one check-script per URL, run with xargs -P
          OUTDIR=$(mktemp -d)
          sort -u "$URL_TMP" > /tmp/urls-sorted.txt
          idx=0
          while IFS='|' read -r pkg url; do
            case "$url" in
              file://*)
                printf 'SKIP|%s|%s\n' "$pkg" "$url" > "${OUTDIR}/r_${idx}"
                ;;
              *)
                {
                  printf 'code=$(curl -sS -o /dev/null -w "%%{http_code}" --connect-timeout 5 --max-time 10 -L '\''%s'\'' 2>/dev/null) ||:\n' "$url"
                  printf '[ -z "$code" ] && code="000"\n'
                  printf 'case "$code" in\n200|301|302|307|308) printf "OK|%%s|%%s\\n" '\''%s'\'' '\''%s'\'' ;;\n*) printf "FAIL|%%s|%%s|HTTP %%s\\n" '\''%s'\'' '\''%s'\'' "$code" ;;\nesac\n' "$pkg" "$url" "$pkg" "$url"
                } > "${OUTDIR}/c_${idx}.sh"
                chmod +x "${OUTDIR}/c_${idx}.sh"
                ;;
            esac
            idx=$((idx + 1))
          done < /tmp/urls-sorted.txt

          # Run in parallel, collect results
          find "${OUTDIR}" -name 'c_*.sh' -print0 | xargs -0 -P 16 -I '{}' sh -c 'sh "{}" > "{}.out"'

          # Tally results
          ok=0; fail=0; skip=0
          for f in "${OUTDIR}"/r_*; do
            [ -f "$f" ] || continue
            IFS='|' read -r status pkg url < "$f"
            case "$status" in
              OK) ok=$((ok+1)) ;;
              SKIP) skip=$((skip+1)) ;;
              FAIL) fail=$((fail+1)); echo "::warning file=$PKGS_DIR/$pkg/LankeBUILD.json::[$pkg] Unreachable: $url" ;;
            esac
          done
          for f in "${OUTDIR}"/c_*.sh.out; do
            [ -f "$f" ] || continue
            IFS='|' read -r status pkg url extra < "$f"
            [ -z "$status" ] && continue
            case "$status" in
              OK) ok=$((ok+1)) ;;
              FAIL) fail=$((fail+1)); echo "::warning file=$PKGS_DIR/$pkg/LankeBUILD.json::[$pkg] Unreachable ($extra): $url" ;;
            esac
          done

          rm -f "$URL_TMP" /tmp/urls-sorted.txt
          rm -rf "$OUTDIR"

          if [ "$fail" -gt 0 ]; then
            echo "::warning::$fail of $url_total URLs unreachable"
          fi
