name: lpkg Build

on:
  push:
    branches: [main]
    paths:
      - 'lpkg/**'
      - '.github/workflows/lpkg-build.yml'
  pull_request:
    branches: [main]
    paths:
      - 'lpkg/**'
      - '.github/workflows/lpkg-build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Build static binary and run tests (Alpine 3.19 Docker)
        run: make -C lpkg docker test
