<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
  </defs>
  <!-- Background rounded rect -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>
  <!-- Pine tree silhouette -->
  <g fill="#4ade80" opacity="0.9">
    <!-- Trunk -->
    <rect x="58" y="80" width="12" height="28" rx="2" fill="#166534"/>
    <!-- Bottom tier -->
    <polygon points="64,20 36,58 50,58 50,64 78,64 78,58 92,58"/>
    <!-- Middle tier -->
    <polygon points="64,34 42,64 54,64 54,70 74,70 74,64 86,64"/>
    <!-- Top tier -->
    <polygon points="64,48 50,70 78,70"/>
  </g>
  <!-- "L" text -->
  <text x="64" y="108" text-anchor="middle" font-family="monospace" font-size="36" font-weight="bold" fill="#e2e8f0">L</text>
</svg>
