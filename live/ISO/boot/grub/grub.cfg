# ---------------------------------------------------------
# LankeOS LiveCD GRUB Configuration
# ---------------------------------------------------------

# 加载基础模块
insmod part_gpt
insmod part_msdos
insmod fat
insmod iso9660
insmod ext2

# 设置视频模式 (避开复杂字体，使用标准输出)
insmod all_video
insmod video_bochs
insmod video_cirrus
insmod gfxterm

# 基础显示设置
terminal_input console
terminal_output console

# 设置超时与默认选项
set timeout=10
set default=0

# 设置菜单颜色（既然没字体，颜色还是可以加一点的）
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# ---------------------------------------------------------
# 引导条目
# ---------------------------------------------------------

menuentry "LankeOS Live Recovery" --class lankeos --class gnu-linux {
    echo "Loading LankeOS Kernel..."
    linux /boot/vmlinuz-lanke rw loglevel=3 console=ttyS0 console=tty1 live
    
    echo "Loading LankeOS Initramfs..."
    initrd /boot/initrd.img
}

menuentry "LankeOS Live (Copy to RAM)" --class lankeos {
    echo "Loading Kernel to memory..."
    linux /boot/vmlinuz-lanke rw toram loglevel=3 console=ttyS0 console=tty1 live
    initrd /boot/initrd.img
}

menuentry "Reboot System" {
    reboot
}

menuentry "Power Off" {
    halt
}
